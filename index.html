<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harrison B. Goldberg | Mechanical Engineering Student</title>
    <meta name="description" content="Mechanical Engineering freshman at Arizona State University. Founder of Harbegold LLC. Building Noot, Fino, and hands-on engineering projects." />
    <link rel="icon" type="image/png" href="/harrison-cover.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-primary: #fbfbfd;
        --bg-secondary: #f5f5f7;
        --text-primary: #1d1d1f;
        --text-secondary: #6e6e73;
        --accent: #007aff;
        --border: rgba(0, 0, 0, 0.08);
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .mono {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      .glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      .glass-soft {
        background: rgba(0, 0, 0, 0.04);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(0, 0, 0, 0.06);
      }
      .apple-gradient {
        background: linear-gradient(180deg, #1d1d1f 0%, #6e6e73 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .feature-card {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .feature-card:hover {
        background: rgba(0, 0, 0, 0.05);
        transform: translateY(-2px);
      }
      ::selection {
        background-color: #007aff;
        color: #fff;
      }
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.15);
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
